# Firebase App Hosting — https://firebase.google.com/docs/app-hosting/configure
# I valori impostati nella Console Firebase hanno precedenza su questo file.
#
# Le variabili sensibili (API_KEY, APP_ID, ecc.) vanno configurate in:
# Firebase Console → App Hosting → backend → Settings → Environment
# oppure come secret: firebase apphosting:secrets:set NOME_SECRET

runConfig:
  minInstances: 0

env:
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: programma-lavoro-8c0cd
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: programma-lavoro-8c0cd.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: programma-lavoro-8c0cd.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_LEGAL_CONTACT_EMAIL
    value: gymlionshop@gmail.com
    availability:
      - BUILD
      - RUNTIME
  # App Check (reCAPTCHA v3). Decommenta e inserisci la site key per attivarlo.
  # Deve essere disponibile a BUILD (le variabili NEXT_PUBLIC sono inlinate nel bundle).
  # - variable: NEXT_PUBLIC_FIREBASE_APPCHECK_SITE_KEY
  #   value: "LA_TUA_RECAPTCHA_V3_SITE_KEY"
  #   availability:
  #     - BUILD
  #     - RUNTIME
